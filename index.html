<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#10b981">
<title>NutrIA — Diario alimentare con AI</title>
<style>
  :root {
    --green: #10b981;
    --green-dark: #059669;
    --green-bg: #ecfdf5;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text-2: #64748b;
    --text-3: #94a3b8;
    --border: #e2e8f0;
    --red: #ef4444;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 120px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 16px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-badge {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px;
    box-shadow: 0 4px 12px rgba(16,185,129,.3);
  }
  .logo h1 { font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
  .logo h1 span { color: var(--green); }
  .icon-btn {
    background: var(--card); border: 1px solid var(--border);
    width: 38px; height: 38px; border-radius: 12px;
    font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .icon-btn:active { background: var(--border); }

  /* Date navigator */
  .date-nav {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px 8px; margin-bottom: 14px;
  }
  .date-nav button {
    background: none; border: none; font-size: 20px; color: var(--text-2);
    width: 40px; height: 40px; cursor: pointer; border-radius: 10px;
  }
  .date-nav button:disabled { opacity: .25; }
  .date-nav button:not(:disabled):active { background: var(--bg); }
  .date-label { font-weight: 600; font-size: 15px; text-transform: capitalize; }
  .date-label small { display: block; text-align: center; font-weight: 500; color: var(--green); font-size: 11px; }

  /* Totals card */
  .totals {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
  }
  .cal-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .cal-big { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
  .cal-unit { font-size: 15px; color: var(--text-2); font-weight: 600; }
  .cal-target { font-size: 13px; color: var(--text-3); margin-bottom: 14px; }
  .cal-bar { height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-bottom: 18px; }
  .cal-bar i { display: block; height: 100%; background: var(--green); border-radius: 99px; transition: width .5s ease; }
  .cal-bar i.over { background: var(--red); }
  .macros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .macro { text-align: center; padding: 10px 4px; background: var(--bg); border-radius: 12px; }
  .macro b { display: block; font-size: 16px; font-weight: 700; }
  .macro span { font-size: 11px; color: var(--text-2); }
  .macro .dot { display: inline-block; width: 7px; height: 7px; border-radius: 99px; margin-right: 4px; }

  /* Section title */
  .sec-title { font-size: 14px; font-weight: 700; color: var(--text-2); margin: 18px 4px 10px; }

  /* Entries */
  .entry {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    animation: pop .25s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } }
  .entry-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .entry-name { font-weight: 600; font-size: 15px; }
  .entry-time { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .entry-kcal { font-weight: 800; font-size: 16px; white-space: nowrap; }
  .entry-kcal small { font-weight: 500; color: var(--text-3); font-size: 11px; }
  .entry-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .pill { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 99px; }
  .pill.p { background: #dbeafe; color: #1d4ed8; }
  .pill.c { background: #fef3c7; color: #b45309; }
  .pill.f { background: #fee2e2; color: #b91c1c; }
  .pill.fib { background: #dcfce7; color: #15803d; }
  .entry-del {
    background: none; border: none; color: var(--text-3); cursor: pointer;
    font-size: 16px; padding: 2px 6px; border-radius: 8px;
  }
  .entry-del:active { color: var(--red); }
  .entry-items { margin-top: 10px; font-size: 12px; color: var(--text-2); border-top: 1px dashed var(--border); padding-top: 8px; }
  .entry-items li { margin-left: 16px; margin-top: 2px; }
  .empty {
    text-align: center; color: var(--text-3); font-size: 14px;
    padding: 36px 16px; background: var(--card); border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty b { display: block; font-size: 28px; margin-bottom: 8px; }

  /* Input bar */
  .input-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(248,250,252,.92); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .input-inner { max-width: 480px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }
  textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 14px; font: inherit; font-size: 15px; background: var(--card);
    max-height: 110px; outline: none; transition: border-color .15s;
  }
  textarea:focus { border-color: var(--green); }
  .send-btn {
    background: var(--green); color: #fff; border: none;
    width: 48px; height: 48px; border-radius: 14px; font-size: 19px;
    cursor: pointer; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(16,185,129,.35);
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s, background .15s;
  }
  .send-btn:active { transform: scale(.93); }
  .send-btn:disabled { opacity: .5; box-shadow: none; }
  .spinner {
    width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,.35);
    border-top-color: #fff; border-radius: 99px; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; font-size: 13px; font-weight: 600;
    padding: 10px 18px; border-radius: 99px; z-index: 60;
    max-width: 90vw; text-align: center;
    animation: pop .25s ease;
  }
  .toast.err { background: var(--red); }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,.45);
    display: flex; align-items: flex-end; justify-content: center; z-index: 50;
  }
  @media (min-width: 520px) { .overlay { align-items: center; } }
  .modal {
    background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
    padding: 22px; animation: pop .25s ease;
  }
  @media (min-width: 520px) { .modal { border-radius: 20px; margin: 16px; } }
  .modal h2 { font-size: 17px; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: var(--text-2); margin-bottom: 14px; line-height: 1.5; }
  .modal label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 6px; }
  .modal input {
    width: 100%; border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 13px; font: inherit; font-size: 14px; outline: none;
  }
  .modal input:focus { border-color: var(--green); }
  .modal .btn {
    width: 100%; margin-top: 18px; background: var(--green); color: #fff;
    border: none; border-radius: 12px; padding: 13px; font: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .modal .btn:active { background: var(--green-dark); }
  .modal a { color: var(--green); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-badge">N</div>
      <h1>Nutr<span>IA</span></h1>
    </div>
    <button class="icon-btn" id="settingsBtn" title="Impostazioni">⚙️</button>
  </header>

  <div class="date-nav">
    <button id="prevDay">‹</button>
    <div class="date-label" id="dateLabel"></div>
    <button id="nextDay">›</button>
  </div>

  <div class="totals">
    <div class="cal-row">
      <span class="cal-big" id="calTotal">0</span>
      <span class="cal-unit">kcal</span>
    </div>
    <div class="cal-target" id="calTarget"></div>
    <div class="cal-bar"><i id="calBar"></i></div>
    <div class="macros">
      <div class="macro"><b id="mProt">0g</b><span><i class="dot" style="background:#3b82f6"></i>Proteine</span></div>
      <div class="macro"><b id="mCarb">0g</b><span><i class="dot" style="background:#f59e0b"></i>Carboid.</span></div>
      <div class="macro"><b id="mFat">0g</b><span><i class="dot" style="background:#ef4444"></i>Grassi</span></div>
      <div class="macro"><b id="mFib">0g</b><span><i class="dot" style="background:#10b981"></i>Fibre</span></div>
    </div>
  </div>

  <div class="sec-title" id="entriesTitle">Pasti</div>
  <div id="entries"></div>
</div>

<div class="input-bar">
  <div class="input-inner">
    <textarea id="descInput" rows="1" placeholder="Descrivi cosa hai mangiato…"></textarea>
    <button class="send-btn" id="sendBtn" title="Analizza con AI">➤</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const STORE_KEY = "nutria_entries_v1";
const KEY_KEY = "nutria_api_key";
const GOAL_KEY = "nutria_cal_goal";

let entries = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
let currentDate = todayISO();

function todayISO(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(entries)); }
function goal() { return parseInt(localStorage.getItem(GOAL_KEY) || "2000"); }

function toast(msg, isErr = false) {
  const t = document.createElement("div");
  t.className = "toast" + (isErr ? " err" : "");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

/* ---------- Rendering ---------- */
function render() {
  const dayEntries = entries.filter(e => e.date === currentDate);

  // date label
  const d = new Date(currentDate + "T12:00:00");
  const isToday = currentDate === todayISO();
  $("dateLabel").innerHTML =
    d.toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" }) +
    (isToday ? "<small>oggi</small>" : "");
  $("nextDay").disabled = isToday;

  // totals
  const sum = k => dayEntries.reduce((s, e) => s + (e[k] || 0), 0);
  const cal = Math.round(sum("calories"));
  $("calTotal").textContent = cal;
  $("calTarget").textContent = `Obiettivo: ${goal()} kcal · ${Math.max(0, goal() - cal)} rimanenti`;
  const pct = Math.min(100, cal / goal() * 100);
  const bar = $("calBar");
  bar.style.width = pct + "%";
  bar.classList.toggle("over", cal > goal());
  $("mProt").textContent = Math.round(sum("protein")) + "g";
  $("mCarb").textContent = Math.round(sum("carbs")) + "g";
  $("mFat").textContent = Math.round(sum("fat")) + "g";
  $("mFib").textContent = Math.round(sum("fiber")) + "g";

  // entries
  $("entriesTitle").textContent = `Pasti (${dayEntries.length})`;
  const box = $("entries");
  box.innerHTML = "";
  if (!dayEntries.length) {
    box.innerHTML = `<div class="empty"><b>🥗</b>Nessun pasto registrato.<br>Scrivi qui sotto cosa hai mangiato!</div>`;
    return;
  }
  for (const e of dayEntries.slice().reverse()) {
    const el = document.createElement("div");
    el.className = "entry";
    const items = (e.items || []).map(i =>
      `<li>${esc(i.name)} ${i.quantity ? `(${esc(i.quantity)})` : ""} — ${Math.round(i.calories)} kcal</li>`).join("");
    el.innerHTML = `
      <div class="entry-top">
        <div>
          <div class="entry-name">${esc(e.name)}</div>
          <div class="entry-time">${e.time}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="entry-kcal">${Math.round(e.calories)} <small>kcal</small></span>
          <button class="entry-del" data-id="${e.id}" title="Elimina">✕</button>
        </div>
      </div>
      <div class="entry-pills">
        <span class="pill p">P ${Math.round(e.protein)}g</span>
        <span class="pill c">C ${Math.round(e.carbs)}g</span>
        <span class="pill f">G ${Math.round(e.fat)}g</span>
        ${e.fiber ? `<span class="pill fib">Fib ${Math.round(e.fiber)}g</span>` : ""}
      </div>
      ${items.length > 1 || (e.items && e.items.length > 1) ? `<ul class="entry-items">${items}</ul>` : ""}`;
    box.appendChild(el);
  }
  box.querySelectorAll(".entry-del").forEach(b =>
    b.onclick = () => { entries = entries.filter(x => x.id !== b.dataset.id); save(); render(); });
}
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

/* ---------- AI analysis ---------- */
async function analyze(description) {
  const apiKey = localStorage.getItem(KEY_KEY);
  if (!apiKey) { openSettings(true); throw new Error("Inserisci prima la tua API key Anthropic"); }

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: `Sei un nutrizionista esperto. Analizza la descrizione di un pasto e stima i valori nutrizionali con porzioni realistiche italiane.
Rispondi SOLO con JSON valido, senza markdown né testo extra, in questo formato:
{"name":"nome breve del pasto","items":[{"name":"alimento","quantity":"quantità stimata","calories":0,"protein":0,"carbs":0,"fat":0,"fiber":0}]}
calories in kcal; protein, carbs, fat, fiber in grammi. Se la quantità non è indicata, stima una porzione tipica.`,
      messages: [{ role: "user", content: description }],
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 401) throw new Error("API key non valida — controlla le impostazioni");
    throw new Error(err?.error?.message || `Errore API (${res.status})`);
  }
  const data = await res.json();
  const text = data.content[0].text.replace(/```json\n?|```\n?/g, "").trim();
  const parsed = JSON.parse(text);
  const items = parsed.items || [];
  const sum = k => items.reduce((s, i) => s + (Number(i[k]) || 0), 0);
  return {
    name: parsed.name || description.slice(0, 60),
    items,
    calories: sum("calories"), protein: sum("protein"),
    carbs: sum("carbs"), fat: sum("fat"), fiber: sum("fiber"),
  };
}

async function submit() {
  const input = $("descInput");
  const desc = input.value.trim();
  if (!desc) return;
  const btn = $("sendBtn");
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div>`;
  try {
    const result = await analyze(desc);
    entries.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      date: currentDate,
      time: new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" }),
      description: desc,
      ...result,
    });
    save();
    input.value = "";
    input.style.height = "auto";
    render();
    toast(`✓ ${result.name} — ${Math.round(result.calories)} kcal`);
  } catch (e) {
    toast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = "➤";
  }
}

/* ---------- Settings modal ---------- */
function openSettings(highlight = false) {
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `
    <div class="modal">
      <h2>Impostazioni</h2>
      <p>NutrIA usa l'AI di Anthropic per analizzare i pasti. Crea una API key su
      <a href="https://console.anthropic.com" target="_blank" rel="noopener">console.anthropic.com</a>.
      La chiave resta salvata solo sul tuo dispositivo.</p>
      <label>API key Anthropic ${highlight ? "⚠️" : ""}</label>
      <input id="keyInput" type="password" placeholder="sk-ant-…" value="${esc(localStorage.getItem(KEY_KEY) || "")}">
      <label>Obiettivo calorie giornaliero</label>
      <input id="goalInput" type="number" min="800" max="6000" value="${goal()}">
      <button class="btn" id="saveSettings">Salva</button>
    </div>`;
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  document.body.appendChild(ov);
  ov.querySelector("#saveSettings").onclick = () => {
    const k = ov.querySelector("#keyInput").value.trim();
    const g = parseInt(ov.querySelector("#goalInput").value) || 2000;
    if (k) localStorage.setItem(KEY_KEY, k); else localStorage.removeItem(KEY_KEY);
    localStorage.setItem(GOAL_KEY, String(g));
    ov.remove();
    render();
    toast("Impostazioni salvate");
  };
}

/* ---------- Events ---------- */
$("sendBtn").onclick = submit;
$("descInput").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
});
$("descInput").addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 110) + "px";
});
$("settingsBtn").onclick = () => openSettings();
$("prevDay").onclick = () => { currentDate = shiftDate(-1); render(); };
$("nextDay").onclick = () => { currentDate = shiftDate(1); render(); };
function shiftDate(n) {
  const d = new Date(currentDate + "T12:00:00");
  d.setDate(d.getDate() + n);
  return todayISO(d);
}

render();
if (!localStorage.getItem(KEY_KEY)) openSettings(true);
</script>
</body>
</html>
